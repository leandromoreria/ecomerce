<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Upload de Nota Fiscal Eletrônica - Ateliê Aiello">
    <meta name="robots" content="noindex">

    <title>Upload da NF-e - Ateliê Aiello</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #E0F7FA, #f4f4f48e);
            min-height: 100vh;
        }
        .upload-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        h1 {
            color: #222;
            text-align: center;
            margin-bottom: 2rem;
        }
        #file-input {
            margin-bottom: 1rem;
            padding: 0.5rem;
        }
        #upload-button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        #upload-button:hover {
            background-color: #45a049;
        }
        #download-link {
            display: none;
            margin-top: 1rem;
        }
        #download-pdf {
            color: #2196F3;
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid #2196F3;
            border-radius: 4px;
        }
        #download-pdf:hover {
            background-color: #2196F3;
            color: white;
        }
    </style>

</head>
<body>
    <div class="upload-container">
        <h1>Upload da NF-e</h1>
        <div>
            <input type="file" id="file-input" accept=".pdf">
            <button id="upload-button">Enviar NF-e</button>
        </div>
        
        <div id="download-link">
            <a id="download-pdf" href="#" download>Baixar NF-e</a>
        </div>
    </div>

    <script src="pdf.js"></script>
</body>
</html>
